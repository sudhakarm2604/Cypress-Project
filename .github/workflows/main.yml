name: Cypress E2E Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  NODE_VERSION: '20'
  CACHE_KEY: cypress-cache

jobs:
  cypress-run:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        node-version: [20]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache Cypress
        uses: actions/cache@v3
        with:
          path: ~/.cache/Cypress
          key: ${{ runner.os }}-cypress-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-cypress-

      - name: Install dependencies
        run: npm ci
        continue-on-error: false

      - name: Verify Cypress installation
        run: npx cypress verify

      - name: Build application
        run: npm run build
        continue-on-error: true

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          start: npm start
          wait-on: 'http://localhost:3000'
          wait-on-timeout: 120
          browser: chrome
          record: false
          spec: 'cypress/e2e/**/*.cy.js'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: cypress-videos-screenshots
          path: |
            cypress/videos
            cypress/screenshots
          retention-days: 7

      - name: Generate test report
        if: always()
        run: |
          echo "Test execution completed at $(date)" > test-report.txt
          echo "Branch: ${{ github.ref }}" >> test-report.txt
          echo "Commit: ${{ github.sha }}" >> test-report.txt

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-report
          path: test-report.txt
          retention-days: 30

      - name: Test Summary
        if: always()
        run: |
          echo "✅ Cypress tests execution completed"
          echo "View artifacts for test results and screenshots"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Cypress tests failed!"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"

  status-check:
    name: Test Status Check
    runs-on: ubuntu-latest
    needs: cypress-run
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.cypress-run.result }}" == "failure" ]; then
            echo "❌ Tests failed"
            exit 1
          else
            echo "✅ All tests passed"
          fi
